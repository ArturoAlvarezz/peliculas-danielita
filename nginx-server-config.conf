# Configuración de Nginx para peliculas.arturoalvarez.site
# Ubicación sugerida: /etc/nginx/sites-available/peliculas.arturoalvarez.site

server {
    listen 80;
    listen 443 ssl http2;
    server_name peliculas.arturoalvarez.site;

    # Certificados SSL (ajusta las rutas según tu configuración)
    ssl_certificate /etc/letsencrypt/live/peliculas.arturoalvarez.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/peliculas.arturoalvarez.site/privkey.pem;

    # Logs
    access_log /var/log/nginx/peliculas.access.log;
    error_log /var/log/nginx/peliculas.error.log;

    # Backend API - Proxy al contenedor Docker en puerto 8068
    location /api/ {
        proxy_pass http://localhost:8068/api/;
        proxy_http_version 1.1;
        
        # Headers necesarios
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_cache_bypass $http_upgrade;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Frontend - Proxy al contenedor frontend (ajusta el puerto si es necesario)
    # Si tienes el frontend en otro puerto, cámbialo aquí
    location / {
        # Si el frontend está en un contenedor:
        # proxy_pass http://localhost:PUERTO_FRONTEND;
        
        # O si usas root (archivos estáticos directamente):
        root /var/www/peliculas;
        try_files $uri $uri/ /index.html;
        
        # Headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
    }

    # Cache para assets estáticos
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        
        # Si usas proxy:
        # proxy_pass http://localhost:PUERTO_FRONTEND;
        
        # Si usas archivos estáticos:
        root /var/www/peliculas;
    }

    # Deshabilitar cache para index.html
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        
        # Si usas proxy:
        # proxy_pass http://localhost:PUERTO_FRONTEND;
        
        # Si usas archivos estáticos:
        root /var/www/peliculas;
    }

    # Redirigir HTTP a HTTPS
    if ($scheme != "https") {
        return 301 https://$server_name$request_uri;
    }
}
